# File: ~/ros2_ws/src/swerve_robot/swerve_navigation/config/slam_toolbox.yaml

slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_region_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    mode: mapping

    map_resolution: 0.05
    map_update_interval: 1.0
    resolution: 0.05
    
    max_laser_range: 25.0
    minimum_laser_range: 0.45
    minimum_time_interval: 0.2
    transform_timeout: 0.2
    tf_buffer_duration: 10.0
    stack_size_to_use: 40000000
    
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.3
    minimum_travel_heading: 0.15
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 25.0
    
    link_match_minimum_response_fine: 0.45
    link_scan_maximum_distance: 1.5
    
    distance_variance_penalty: 0.3
    angle_variance_penalty: 0.7
    
    correlation_search_space_dimension: 0.3
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.05